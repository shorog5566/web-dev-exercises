<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nature Images Gallery</title>

    <style>
        /* The Body style */
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f9f9f9;
        }

        /* The Gallery layout */
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
        }

        /* The Box for each image */
        .image-card {
            width: 450px;
        }

        /* The Image style and filter */
        img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            filter: grayscale(50%); 
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* The Text style */
        p {
            font-size: 16px;
            color: #333;
            margin-top: 10px;
            text-align: center;
        }

        /* The Main title */
        h1 {
            text-align: center;
            margin-bottom: 40px;
        }
    </style>

</head>

<body>

    <h1>Nature Gallery</h1>

    <div class="gallery">
        
        <div class="image-card">
            <img src="https://picsum.photos/id/10/600/400" alt="Mountain view" title="Mountain">
            <p>License: Free for commercial use (Mountain view)</p>
        </div>

        <div class="image-card">
            <img src="https://picsum.photos/id/28/600/400" alt="Forest view" title="Forest">
            <p>License: Free for commercial use (Forest view)</p>
        </div>

        <div class="image-card">
            <img src="https://picsum.photos/id/37/600/400" alt="Ocean view" title="Ocean">
            <p>License: Free for commercial use (Ocean view)</p>
        </div>

    </div>
    </body>
</html>
