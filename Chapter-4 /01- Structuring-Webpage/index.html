<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Digi Fest 2024</title>
    
    <style>
        /* The Basic page settings */
        body {
            font-family: Arial, sans-serif;
            background-color: #eeeeee;
            margin: 0;
        }

        /* The Header style */
        header {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px;
        }

        /* The Nav links style */
        nav {
            background-color: #444;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }

        /* The Content area */
        main {
            width: 80%;
            margin: 20px auto;
            background-color: white;
            padding: 20px;
        }

        /* The Image settings */
        img {
            width: 200px;
            height: 150px;
            margin: 10px;
            border: 2px solid #ccc;
        }

        /* The Footer style */
        footer {
            text-align: center;
            padding: 10px;
            background-color: #333;
            color: white;
        }
    </style>
</head>

<body>

    <header>
        <h1>Digi Fest 2024</h1>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <main>
        <section>
            <h2>Welcome</h2>
            <p>Digi Fest is a celebration of digital and technology in the city of Cardiff. This year, we are celebrating collaboration.</p>
        </section>

        <section>
            <h2>Line Up</h2>
            <p>Check out our amazing speakers and events.</p>

            <img src="https://picsum.photos/id/1/200/150" alt="event1">
            <img src="https://picsum.photos/id/2/200/150" alt="event2">
        </section>
    </main>

    <footer>
        <p>© 2024 Digi Fest</p>
    </footer>

</body>
</html>
